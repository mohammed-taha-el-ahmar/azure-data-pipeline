name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Smoke tests — shared Python logic + mocked Azure Function handler
  # ---------------------------------------------------------------------------
  smoke-tests:
    name: Smoke tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra functions

      - name: Run smoke tests
        run: |
          uv run pytest tests/ \
            --tb=short \
            --cov=shared \
            --cov=functions \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # Lint — keep shared/ and functions/ tidy
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check shared/ functions/ tests/

      - name: Ruff format check
        run: uv run ruff format --check shared/ functions/ tests/

  # ---------------------------------------------------------------------------
  # Terraform — validate and fmt-check (no cloud credentials required)
  # ---------------------------------------------------------------------------
  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform fmt check
        run: terraform fmt -check -recursive

      - name: terraform validate
        run: terraform validate
